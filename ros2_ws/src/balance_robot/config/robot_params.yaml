/**:
  ros__parameters:
    imu:
      type: bno086
      interface: i2c
      i2c_bus: 1
      i2c_address: 0x4A
      frame_id: imu_link
      publish_rate_hz: 50

    encoders:
      left_gpio_a: 17
      left_gpio_b: 27
      right_gpio_a: TODO
      right_gpio_b: TODO
      # TEMPORARY: 11 motor PPR x 56:1 gearbox x 4 quadrature edges.
      # Calibrate on hardware before trusting absolute position/RPM scale.
      ticks_per_revolution: 2464
      wheel_radius_m: 0.03
      wheel_base_m: TODO
      publish_rate_hz: 50

    motors:
      driver: TODO
      left_pwm_pin: TODO
      left_dir_pin: TODO
      right_pwm_pin: TODO
      right_dir_pin: TODO
      pwm_frequency_hz: 1000
      max_command: 1.0

    estimator:
      imu_topic: /imu/data
      theta_sign: 1.0
      theta_dot_sign: 1.0
      theta_offset_rad: 0.0
      theta_dot_axis: "y"

    control:
      mode: mock
      lqr_gain: [0.0, 0.0, 0.0, 0.0]
      safety_angle_limit_deg: 25.0

    safety:
      startup_mode: "IDLE"
      allow_motor_commands_only_in_balancing: true
      publish_rate_hz: 10.0

    teleop:
      enabled: true
      arm_button: 1
      balance_button: 2
      estop_button: 5
      reset_button: 4
      deadman_button: 7
      require_deadman: true

    joystick:
      enabled: false
      device: TODO
      topic: /joy_cmd
