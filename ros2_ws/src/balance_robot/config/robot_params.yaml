/**:
  ros__parameters:
    imu:
      type: bno086
      interface: i2c
      i2c_bus: 1
      i2c_address: 0x4A
      frame_id: imu_link
      publish_rate_hz: 50.0

    encoders:
      left_gpio_a: 17
      left_gpio_b: 27
      right_gpio_a: 22
      right_gpio_b: 25
      # TEMPORARY: 11 motor PPR x 56:1 gearbox x 4 quadrature edges.
      # Calibrate on hardware before trusting absolute position/RPM scale.
      ticks_per_revolution: 2464
      wheel_radius_m: 0.03
      wheel_base_m: TODO
      publish_rate_hz: 50.0

    motors:
      driver: dbh-12v
      left_in1_pin: 5
      left_in2_pin: 6
      left_en_pin: 13
      right_in1_pin: 16
      right_in2_pin: 20
      right_en_pin: 21
      pwm_frequency_hz: 1000.0
      max_command: 1.0

    estimator:
      imu_topic: /imu/data
      theta_sign: 1.0
      theta_dot_sign: 1.0
      theta_offset_rad: 0.0
      theta_dot_axis: "y"
      encoder_stale_timeout_sec: 0.1
      left_wheel_sign: 1.0
      right_wheel_sign: 1.0
      x_sign: 1.0
      x_offset_m: 0.0

    control:
      mode: hardware
      lqr_gain: [0.0, 0.0, 0.0, 0.0]
      safety_angle_limit_deg: 25.0

    safety:
      startup_mode: "IDLE"
      allow_motor_commands_only_in_balancing: true
      publish_rate_hz: 10.0

    teleop:
      enabled: true
      arm_button: 0
      balance_button: 1
      estop_button: 4
      reset_button: 3
      deadman_button: 6
      require_deadman: true

    joystick:
      enabled: false
      device: TODO
      topic: /joy_cmd
